name: childtrack_mobile
description: "ChildTrack Unified Mobile App - Staff, Driver, and Parent roles"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  supabase_flutter: ^2.5.6
  go_router: ^14.2.7
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.5.4

  # Authentication & Security
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2

  # UI & Media
  image_picker: ^1.1.2
  camera: ^0.10.5+9
  flutter_rating_bar: ^4.0.1
  smooth_page_indicator: ^2.0.1
  lottie: ^3.3.2
  record: ^6.2.1
  path_provider: ^2.1.5
  uuid: ^4.5.0

  # Animations & Effects
  flutter_animate: ^4.5.0

  # Maps & Location
  google_maps_flutter: ^2.7.0
  url_launcher: ^6.3.0

  # Shared UI
  shared_ui:
    path: ../packages/shared_ui

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Icon / splash generation helpers
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.0

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices.  The lint set provided by this package is
  # activated in the "analysis_options.yaml" file located at the root of your
  # package.  See that file for information on deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# ── flutter_launcher_icons ───────────────────────────────────────────────────
flutter_launcher_icons:
  image_path: assets/images/logo.png
  android: true
  ios: true
  min_sdk_android: 21
  android_adaptive_icon_foreground: assets/images/logo.png
  android_adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true

# ── flutter_native_splash ─────────────────────────────────────────────────────
flutter_native_splash:
  color: "#F5F7FB"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    color: "#F5F7FB"
