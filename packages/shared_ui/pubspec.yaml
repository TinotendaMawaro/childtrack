name: shared_ui
description: Shared UI components for ChildTrack Flutter apps
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.6
  go_router: ^14.2.7
  flutter_riverpod: ^2.5.1
  local_auth: ^2.2.0
  google_fonts: ^6.1.0
  flutter_secure_storage: ^9.2.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png