name: childtrack_driver_app
description: "ChildTrack Driver Mobile App - Route management & tracking"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  supabase_flutter: ^2.5.6
  go_router: ^14.2.7
  google_maps_flutter: ^2.7.0
  local_auth: ^2.2.0
  shared_preferences: ^2.5.2
  flutter_riverpod: ^2.5.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  shared_ui:
    path: ../packages/shared_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
