name: childtrack_staff_app
description: "ChildTrack Staff Mobile App - Teachers mark attendance, upload photos, update diary"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  supabase_flutter: ^2.5.6
  go_router: ^14.2.7
  image_picker: ^1.1.2
  camera: ^0.10.5+9
  flutter_rating_bar: ^4.0.1
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1
  shared_ui:
    path: ../packages/shared_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  freezed_annotation: ^2.4.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
