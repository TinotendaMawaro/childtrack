name: childtrack_parent_app
description: "ChildTrack Parent App - Nursery childcare management for parents"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  supabase_flutter: ^2.5.6
  go_router: ^14.2.7
  shared_preferences: ^2.5.4
  smooth_page_indicator: ^2.0.1
  lottie: ^3.3.2
  local_auth: ^2.2.0
  flutter_riverpod: ^2.5.1
  shared_ui:
    path: ../packages/shared_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/

